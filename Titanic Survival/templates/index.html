<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Titanic Survival Predictor</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="container">

        <h1>Titanic Survival Predictor</h1>
        <p class="subtitle">Predict whether a passenger survived using a Random Forest Machine Learning model.</p>

        <form action="/predict" method="POST">

            <div class="input-group">

                <label>Passenger Class</label>

                <select name="Pclass" required>
                    <option value="">Select Class</option>
                    <option value="1">1st Class</option>
                    <option value="2">2nd Class</option>
                    <option value="3">3rd Class</option>
                </select>

            </div>

            <div class="input-group">

                <label>Gender</label>

                <select name="Sex" required>
                    <option value="">Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                </select>

            </div>

            <div class="input-group">

                <label>Age</label>

                <input
                    type="number"
                    name="Age"
                    step="0.1"
                    min="0"
                    placeholder="Enter Age"
                    required>

            </div>

            <div class="input-group">

                <label>Siblings / Spouses Aboard</label>

                <input
                    type="number"
                    name="SibSp"
                    min="0"
                    placeholder="Enter SibSp"
                    required>

            </div>

            <div class="input-group">

                <label>Parents / Children Aboard</label>

                <input
                    type="number"
                    name="Parch"
                    min="0"
                    placeholder="Enter Parch"
                    required>

            </div>

            <div class="input-group">

                <label>Fare</label>

                <input
                    type="number"
                    name="Fare"
                    step="0.01"
                    min="0"
                    placeholder="Enter Fare"
                    required>

            </div>

            <div class="input-group">

                <label>Embarked</label>

                <select name="Embarked" required>
                    <option value="">Select Port</option>
                    <option value="C">Cherbourg (C)</option>
                    <option value="Q">Queenstown (Q)</option>
                    <option value="S">Southampton (S)</option>
                </select>

            </div>

            <button type="submit">
                Predict Survival
            </button>

        </form>

        {% if prediction_text %}

        <div class="result">

            <h2>{{ prediction_text }}</h2>

            <h3>Confidence : {{ confidence }}%</h3>

        </div>

        {% endif %}

    </div>

</body>

</html>
