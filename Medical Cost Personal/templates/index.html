<!DOCTYPE html>
<html>

<head>
    <title>Medical Insurance Predictor</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>


<body>

<div class="container">

<h1>Medical Insurance Predictor</h1>


<form action="/predict" method="POST">


<label>Age</label>
<input type="number" name="age" required>


<label>Sex</label>
<select name="sex">
    <option value="male">Male</option>
    <option value="female">Female</option>
</select>


<label>BMI</label>
<input type="number" step="0.01" name="bmi" required>


<label>Children</label>
<input type="number" name="children" required>


<label>Smoker</label>
<select name="smoker">
    <option value="yes">Yes</option>
    <option value="no">No</option>
</select>


<label>Region</label>
<select name="region">

    <option value="southwest">
        Southwest
    </option>

    <option value="southeast">
        Southeast
    </option>

    <option value="northwest">
        Northwest
    </option>

    <option value="northeast">
        Northeast
    </option>

</select>


<button type="submit">
Predict
</button>


</form>


{% if prediction %}

<div class="result">

{{prediction}}

</div>

{% endif %}


</div>


</body>

</html>
